<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM 캠페인 성과 분석기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232638;
    --border: #2e3149;
    --accent: #5b6af5;
    --accent2: #7ee8a2;
    --text: #e8eaf2;
    --text2: #8b8fa8;
    --text3: #5a5e77;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Pretendard', -apple-system, sans-serif;
  }

  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* Header */
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 18px 32px; display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-badge { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; letter-spacing: .08em; padding: 3px 8px; border-radius: 4px; }
  .header h1 { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
  .header-sub { margin-left: auto; font-size: 12px; color: var(--text3); font-family: var(--mono); }

  /* Layout */
  .main { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 57px); }

  /* Sidebar */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 24px 20px; overflow-y: auto; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: .12em; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
  label .req { color: var(--accent); margin-left: 2px; }
  label .opt { color: var(--text3); font-size: 10px; margin-left: 4px; }

  input[type="text"], input[type="number"], select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: var(--sans);
    font-size: 13px; padding: 8px 10px; outline: none; transition: border-color .15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  .file-drop {
    border: 1.5px dashed var(--border); border-radius: 8px; padding: 20px 12px;
    text-align: center; cursor: pointer; transition: border-color .15s, background .15s; position: relative;
  }
  .file-drop:hover, .file-drop.drag { border-color: var(--accent); background: rgba(91,106,245,.05); }
  .file-drop input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .file-drop-icon { font-size: 22px; margin-bottom: 6px; }
  .file-drop-text { font-size: 12px; color: var(--text2); }
  .file-drop-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .file-name { font-size: 12px; color: var(--accent2); margin-top: 6px; font-family: var(--mono); }

  .btn-run {
    width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 8px;
    font-family: var(--sans); font-size: 14px; font-weight: 600; padding: 12px;
    cursor: pointer; transition: background .15s, transform .1s; margin-top: 8px;
  }
  .btn-run:hover { background: #4a59e0; }
  .btn-run:active { transform: scale(.98); }
  .btn-run:disabled { background: var(--surface2); color: var(--text3); cursor: not-allowed; }
  .sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* Content */
  .content { overflow-y: auto; padding: 28px 32px; background: var(--bg); }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; color: var(--text3); gap: 12px; }
  .empty-icon { font-size: 48px; opacity: .3; }
  .empty-text { font-size: 14px; }

  /* Campaign banner */
  .campaign-banner {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid var(--accent); border-radius: 10px;
    padding: 16px 20px; margin-bottom: 24px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .banner-name { font-size: 18px; font-weight: 700; letter-spacing: -.02em; }
  .banner-purpose {
    font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px;
    background: rgba(91,106,245,.15); color: var(--accent); border: 1px solid rgba(91,106,245,.3);
  }
  .banner-date { font-size: 12px; color: var(--text3); margin-left: auto; font-family: var(--mono); }

  /* KPI */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 8px; }
  .kpi-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; position: relative; overflow: hidden;
  }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--kpi-color, var(--accent)); }
  .kpi-label { font-size: 11px; color: var(--text2); font-weight: 500; margin-bottom: 6px; }
  .kpi-value { font-size: 20px; font-weight: 700; font-family: var(--mono); letter-spacing: -.02em; }
  .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* Section */
  .sec-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; margin-top: 28px; }
  .sec-header h2 { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: .06em; text-transform: uppercase; white-space: nowrap; }
  .sec-line { flex: 1; height: 1px; background: var(--border); }

  /* Table */
  .table-wrap { overflow-x: auto; margin-bottom: 6px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th {
    background: var(--surface); color: var(--text3); font-size: 10px; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase; padding: 8px 10px;
    text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  td { padding: 7px 10px; border-bottom: 1px solid rgba(46,49,73,.5); }
  tr:hover td { background: rgba(91,106,245,.04); }
  .num { font-family: var(--mono); text-align: right; }
  .td-name { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .mini-bar-bg { background: var(--surface2); border-radius: 3px; height: 5px; margin-top: 4px; overflow: hidden; min-width: 60px; }
  .mini-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); }

  /* Toolbar */
  .result-toolbar { display: flex; gap: 8px; margin-bottom: 20px; justify-content: flex-end; }
  .btn-sm {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text2);
    font-family: var(--sans); font-size: 12px; padding: 7px 14px; border-radius: 6px;
    cursor: pointer; transition: background .15s;
  }
  .btn-sm:hover { background: var(--border); color: var(--text); }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    font-size: 13px; padding: 10px 18px; border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.4); z-index: 999;
    opacity: 0; transform: translateY(8px); transition: opacity .2s, transform .2s;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .hidden { display: none !important; }

  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">ES사업부</div>
  <h1>CRM 캠페인 성과 분석기</h1>
  <div class="header-sub">B2B OTA · CRM ROI Analyzer</div>
</div>

<div class="main">
  <aside class="sidebar">
    <div class="section-label">캠페인 정보</div>
    <div class="form-group">
      <label>캠페인명 <span class="req">*</span></label>
      <input type="text" id="campaignName" placeholder="예) b2b_260317_SOL beach_lms">
    </div>
    <div class="form-group">
      <label>발송 목적 <span class="req">*</span></label>
      <select id="purpose">
        <option value="">— 선택하세요 —</option>
        <option>리텐션</option>
        <option>첫결제</option>
        <option>재활성화</option>
        <option>유상소진</option>
        <option>기타(영업지원)</option>
      </select>
    </div>
    <div class="form-group">
      <label>발송 건수 <span class="req">*</span></label>
      <input type="number" id="sendCount" placeholder="예) 12006" min="1">
    </div>
    <div class="form-group">
      <label>쿠폰 번호 <span class="opt">선택 · 쉼표로 구분</span></label>
      <input type="text" id="couponNos" placeholder="예) 10003290043, 10003290044">
    </div>

    <hr class="sidebar-divider">
    <div class="section-label">CRM Raw 데이터</div>
    <div class="file-drop" id="fileDrop">
      <input type="file" accept=".csv" id="csvFile">
      <div class="file-drop-icon">📂</div>
      <div class="file-drop-text">CSV 파일을 끌어다 놓거나 클릭</div>
      <div class="file-drop-sub">구매 전환 예약 raw · EUC-KR / UTF-8</div>
      <div class="file-name hidden" id="fileName"></div>
    </div>
    <button class="btn-run" id="runBtn" disabled>분석 실행</button>
  </aside>

  <main class="content">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📊</div>
      <div class="empty-text">캠페인 정보와 CSV를 입력하고 분석을 실행하세요</div>
    </div>

    <div id="resultArea" class="hidden">
      <div class="result-toolbar">
        <button class="btn-sm" id="downloadBtn">⬇ 이미지 저장</button>
      </div>
      <div id="captureArea">
        <!-- Banner -->
        <div class="campaign-banner">
          <div class="banner-name" id="bannerName"></div>
          <div class="banner-purpose" id="bannerPurpose"></div>
          <div class="banner-date" id="bannerDate"></div>
        </div>
        <!-- KPIs -->
        <div class="sec-header"><h2>핵심 지표</h2><div class="sec-line"></div></div>
        <div class="kpi-grid" id="kpiGrid"></div>
        <!-- Segments -->
        <div id="segmentArea"></div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
let parsedRows = [];

/* ── 숫자 파싱: "1,234,567" / "[NULL]" 모두 처리 ── */
function pn(v) {
  if (!v) return 0;
  const s = String(v).replace(/,/g, '').replace(/\[NULL\]/gi, '').trim();
  return parseFloat(s) || 0;
}

/* ── 쿠폰번호 정규화: 쉼표 제거 + 대문자 ── */
function normCpn(v) {
  return String(v || '').replace(/,/g, '').trim().toUpperCase();
}

/* ── CSV 파싱 (EUC-KR / UTF-8 자동 감지) ── */
function parseCSV(buffer) {
  let text;
  try {
    text = new TextDecoder('euc-kr').decode(buffer);
    if (text.includes('\uFFFD')) throw new Error();
  } catch {
    text = new TextDecoder('utf-8').decode(buffer);
  }
  // BOM 제거
  text = text.replace(/^\uFEFF/, '');
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = csvSplit(lines[0]);
  return lines.slice(1).map(line => {
    const vals = csvSplit(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').trim(); });
    return obj;
  }).filter(r => Object.values(r).some(v => v));
}

function csvSplit(line) {
  const res = []; let cur = ''; let inQ = false;
  for (const c of line) {
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { res.push(cur); cur = ''; continue; }
    cur += c;
  }
  res.push(cur);
  return res;
}

/* ── File handling ── */
document.getElementById('csvFile').addEventListener('change', async e => {
  if (e.target.files[0]) await loadFile(e.target.files[0]);
});
const fd = document.getElementById('fileDrop');
fd.addEventListener('dragover', e => { e.preventDefault(); fd.classList.add('drag'); });
fd.addEventListener('dragleave', () => fd.classList.remove('drag'));
fd.addEventListener('drop', async e => {
  e.preventDefault(); fd.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.name.endsWith('.csv')) await loadFile(f);
});

async function loadFile(file) {
  parsedRows = parseCSV(await file.arrayBuffer());
  const fn = document.getElementById('fileName');
  fn.textContent = `✓ ${file.name}  (${parsedRows.length.toLocaleString()}건)`;
  fn.classList.remove('hidden');
  checkReady();
}

['campaignName','sendCount'].forEach(id => document.getElementById(id).addEventListener('input', checkReady));
document.getElementById('purpose').addEventListener('change', checkReady);
function checkReady() {
  const ok = document.getElementById('campaignName').value.trim()
    && document.getElementById('purpose').value
    && Number(document.getElementById('sendCount').value) > 0
    && parsedRows.length > 0;
  document.getElementById('runBtn').disabled = !ok;
}

/* ── Compute ── */
function computeMetrics() {
  const sendCount = parseInt(document.getElementById('sendCount').value) || 0;
  const couponRaw = document.getElementById('couponNos').value.trim();
  // 입력 쿠폰번호: 쉼표 구분 후 각 번호 내부 쉼표 제거
  const couponNos = couponRaw
    ? couponRaw.split(',').map(c => c.replace(/,/g,'').trim().toUpperCase()).filter(Boolean)
    : [];

  // 취소 제외
  const converted = parsedRows.filter(r => {
    const s = (r.status || '').trim();
    return s !== '취소' && s.toLowerCase() !== 'cancel';
  });

  const gmvTotal    = converted.reduce((s,r) => s + pn(r.gmv), 0);
  const convCount   = converted.length;
  const convRate    = sendCount > 0 ? convCount / sendCount * 100 : 0;
  const sendCost    = sendCount * 23.1;
  const pointTotal  = converted.reduce((s,r) => s + pn(r.biz_point), 0);
  const gmvPerConv  = convCount > 0 ? gmvTotal / convCount : 0;

  /* 쿠폰 비용: 입력된 쿠폰번호와 일치하는 base/dup 할인액 합산 */
  let couponCost = 0;
  if (couponNos.length > 0) {
    converted.forEach(r => {
      if (couponNos.includes(normCpn(r.base_cpn_no))) couponCost += pn(r.base_dc_cp_amt);
      if (couponNos.includes(normCpn(r.dup_cpn_no)))  couponCost += pn(r.dup_dc_cp_amt);
    });
  }

  const totalCost = sendCost + couponCost;
  const roi       = totalCost > 0 ? (gmvTotal - totalCost) / totalCost * 100 : null;

  /* ── 세그먼트 빌더 ── */
  function seg(keyFn) {
    const m = {};
    converted.forEach(r => {
      const k = (keyFn(r) || '미상').trim() || '미상';
      if (!m[k]) m[k] = { count:0, gmv:0, point:0 };
      m[k].count++;
      m[k].gmv   += pn(r.gmv);
      m[k].point += pn(r.biz_point);
    });
    return Object.entries(m).sort((a,b) => b[1].gmv - a[1].gmv);
  }

  const areaMap   = seg(r => r.area1);
  const catMap    = seg(r => r.seg1_name);
  const bizMap    = seg(r => r.biztrip);
  const vendorMap = seg(r => r.vendor_name).slice(0, 10);
  const compMap   = seg(r => r.company_name || '개인/미상').slice(0, 10);

  /* event_name */
  const evtMap = {};
  converted.forEach(r => {
    const k = (r.event_name || '미상').trim();
    if (!evtMap[k]) evtMap[k] = { count:0, gmv:0, point:0 };
    evtMap[k].count++;
    evtMap[k].gmv   += pn(r.gmv);
    evtMap[k].point += pn(r.biz_point);
  });
  const evtArr = Object.entries(evtMap).sort((a,b) => b[1].count - a[1].count);

  /* 유상포인트 사용/미사용 */
  const pointMap = { '사용': {count:0,gmv:0,point:0}, '미사용': {count:0,gmv:0,point:0} };
  converted.forEach(r => {
    const k = pn(r.biz_point) > 0 ? '사용' : '미사용';
    pointMap[k].count++;
    pointMap[k].gmv   += pn(r.gmv);
    pointMap[k].point += pn(r.biz_point);
  });
  const pointArr = Object.entries(pointMap);

  /* ── 쿠폰 Top 100 (base + dup 통합, GMV 기준) ── */
  const cpnMap = {};
  converted.forEach(r => {
    // base 쿠폰
    const bNo = normCpn(r.base_cpn_no);
    if (bNo && bNo !== '[NULL]') {
      if (!cpnMap[bNo]) cpnMap[bNo] = { name: (r.base_cpn_name||'').trim(), count:0, gmv:0, discount:0, type:'기본' };
      cpnMap[bNo].count++;
      cpnMap[bNo].gmv      += pn(r.gmv);
      cpnMap[bNo].discount += pn(r.base_dc_cp_amt);
    }
    // dup 쿠폰
    const dNo = normCpn(r.dup_cpn_no);
    if (dNo && dNo !== '[NULL]') {
      if (!cpnMap[dNo]) cpnMap[dNo] = { name: (r.dup_cpn_name||'').trim(), count:0, gmv:0, discount:0, type:'중복' };
      cpnMap[dNo].count++;
      cpnMap[dNo].gmv      += pn(r.gmv);
      cpnMap[dNo].discount += pn(r.dup_dc_cp_amt);
    }
  });
  const couponTop = Object.entries(cpnMap)
    .sort((a,b) => b[1].gmv - a[1].gmv)
    .slice(0, 100);

  return {
    sendCount, convCount, convRate, gmvTotal, gmvPerConv,
    pointTotal, sendCost, couponCost, totalCost, roi, couponNos,
    areaMap, catMap, bizMap, vendorMap, compMap, evtArr, pointArr, couponTop,
  };
}

/* ── Format helpers ── */
const fmtN = n => Math.round(n).toLocaleString();
const fmtS = n => {
  if (n >= 1e8) return (n/1e8).toFixed(1)+'억';
  if (n >= 1e4) return Math.round(n/1e4).toLocaleString()+'만';
  return Math.round(n).toLocaleString();
};

/* ── Render KPIs ── */
function renderKPIs(m) {
  const cards = [
    { label:'발송 건수',       val:fmtN(m.sendCount),                  sub:'건',              col:'#8b8fa8' },
    { label:'전환 건수',       val:fmtN(m.convCount),                  sub:'건 (구매 완료)',   col:'#5b6af5' },
    { label:'전환율',          val:m.convRate.toFixed(2)+'%',          sub:'전환/발송',        col:'#7ee8a2' },
    { label:'GMV',             val:fmtS(m.gmvTotal),                   sub:'원',              col:'#7ee8a2' },
    { label:'건당 GMV',        val:fmtS(m.gmvPerConv),                 sub:'원/건',            col:'#a78bfa' },
    { label:'유상포인트 사용',  val:fmtS(m.pointTotal),                 sub:'원 (총액)',        col:'#38bdf8' },
    { label:'발송 비용',       val:fmtS(m.sendCost),                   sub:'원 (23.1원/건)',   col:'#f7c948' },
    { label:'쿠폰 비용',
      val: m.couponNos.length > 0 ? fmtS(m.couponCost) : '미입력',
      sub: m.couponNos.length > 0 ? '원 (입력 쿠폰 기준)' : '쿠폰번호 없음',              col:'#f4a15a' },
    { label:'총 비용',         val:fmtS(m.totalCost),                  sub:'원',              col:'#f4655a' },
    { label:'ROI',
      val: m.roi !== null ? m.roi.toFixed(1)+'%' : '—',
      sub:'(GMV-비용)/비용',
      col: m.roi !== null && m.roi >= 0 ? '#7ee8a2' : '#f4655a' },
  ];
  document.getElementById('kpiGrid').innerHTML = cards.map(c=>`
    <div class="kpi-card" style="--kpi-color:${c.col}">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value" style="color:${c.col}">${c.val}</div>
      <div class="kpi-sub">${c.sub}</div>
    </div>`).join('');
}

/* ── Render Segments ── */
function renderSegments(m) {
  /* 공통 GMV+건당GMV+포인트 테이블 */
  const gmvTable = (title, rows, barColor = 'var(--accent)') => {
    const maxG = Math.max(...rows.map(([,v])=>v.gmv), 1);
    return `
    <div class="sec-header"><h2>${title}</h2><div class="sec-line"></div></div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>구분</th>
        <th class="num">전환 건수</th>
        <th class="num">GMV</th>
        <th class="num">건당 GMV</th>
        <th class="num">유상포인트</th>
        <th style="min-width:80px">비중</th>
      </tr></thead>
      <tbody>${rows.map(([k,v])=>`<tr>
        <td class="td-name">${k}</td>
        <td class="num">${fmtN(v.count)}</td>
        <td class="num" style="color:#7ee8a2">${fmtS(v.gmv)}원</td>
        <td class="num" style="color:#a78bfa">${v.count>0?fmtS(v.gmv/v.count):'—'}원</td>
        <td class="num" style="color:#38bdf8">${v.point>0?fmtS(v.point)+'원':'—'}</td>
        <td><div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${(v.gmv/maxG*100).toFixed(1)}%;background:${barColor}"></div></div></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  };

  /* event_name */
  const totalEvt = m.evtArr.reduce((s,[,v])=>s+v.count, 0);
  const evtTable = `
    <div class="sec-header"><h2>결제 타입 분포</h2><div class="sec-line"></div></div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>타입</th><th class="num">건수</th>
        <th class="num">GMV</th><th class="num">건당 GMV</th>
        <th class="num">유상포인트</th><th style="min-width:80px">비중</th>
      </tr></thead>
      <tbody>${m.evtArr.map(([k,v])=>`<tr>
        <td>${k}</td>
        <td class="num">${fmtN(v.count)}</td>
        <td class="num" style="color:#7ee8a2">${fmtS(v.gmv)}원</td>
        <td class="num" style="color:#a78bfa">${v.count>0?fmtS(v.gmv/v.count):'—'}원</td>
        <td class="num" style="color:#38bdf8">${v.point>0?fmtS(v.point)+'원':'—'}</td>
        <td><div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${totalEvt>0?(v.count/totalEvt*100).toFixed(1):0}%;background:#a78bfa"></div></div></td>
      </tr>`).join('')}</tbody>
    </table></div>`;

  /* 유상포인트 사용/미사용 */
  const ptTable = `
    <div class="sec-header"><h2>유상포인트 사용 여부별 성과</h2><div class="sec-line"></div></div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>포인트 사용</th><th class="num">전환 건수</th>
        <th class="num">GMV</th><th class="num">건당 GMV</th>
        <th class="num">포인트 총액</th>
      </tr></thead>
      <tbody>${m.pointArr.map(([k,v])=>`<tr>
        <td><span class="dot" style="background:${k==='사용'?'#7ee8a2':'#5a5e77'}"></span>${k}</td>
        <td class="num">${fmtN(v.count)}</td>
        <td class="num" style="color:#7ee8a2">${fmtS(v.gmv)}원</td>
        <td class="num" style="color:#a78bfa">${v.count>0?fmtS(v.gmv/v.count):'—'}원</td>
        <td class="num" style="color:#38bdf8">${v.point>0?fmtS(v.point)+'원':'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;

  /* 쿠폰 Top 100 */
  const cpnTable = `
    <div class="sec-header"><h2>쿠폰별 성과 Top 100 (GMV 기준)</h2><div class="sec-line"></div></div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>#</th><th>쿠폰번호</th><th>쿠폰명</th>
        <th class="num">건수</th>
        <th class="num">GMV</th>
        <th class="num">건당 GMV</th>
        <th class="num">쿠폰 할인액</th>
      </tr></thead>
      <tbody>${m.couponTop.map(([no,v],i)=>`<tr>
        <td class="num" style="color:var(--text3)">${i+1}</td>
        <td style="font-family:var(--mono);font-size:11px;color:var(--text2)">${no}</td>
        <td class="td-name">${v.name||'—'}</td>
        <td class="num">${fmtN(v.count)}</td>
        <td class="num" style="color:#7ee8a2">${fmtS(v.gmv)}원</td>
        <td class="num" style="color:#a78bfa">${v.count>0?fmtS(v.gmv/v.count):'—'}원</td>
        <td class="num" style="color:#f4a15a">${v.discount>0?fmtS(v.discount)+'원':'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;

  document.getElementById('segmentArea').innerHTML =
    gmvTable('지역별 성과', m.areaMap) +
    gmvTable('상품 카테고리별 성과', m.catMap) +
    evtTable +
    gmvTable('출장 여부별 성과', m.bizMap) +
    ptTable +
    gmvTable('상품(숙소) Top 10', m.vendorMap, '#f7c948') +
    gmvTable('기업별 Top 10 (GMV 기준)', m.compMap, '#f7c948') +
    cpnTable;
}

/* ── Run ── */
document.getElementById('runBtn').addEventListener('click', () => {
  const m = computeMetrics();
  document.getElementById('emptyState').classList.add('hidden');
  document.getElementById('resultArea').classList.remove('hidden');

  document.getElementById('bannerName').textContent    = document.getElementById('campaignName').value.trim();
  document.getElementById('bannerPurpose').textContent = document.getElementById('purpose').value;
  document.getElementById('bannerDate').textContent    = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});

  renderKPIs(m);
  renderSegments(m);
});

/* ── Image download ── */
document.getElementById('downloadBtn').addEventListener('click', async () => {
  showToast('이미지 생성 중...');
  try {
    const canvas = await html2canvas(document.getElementById('captureArea'), {
      scale: 2, backgroundColor: '#0f1117', useCORS: true, logging: false,
    });
    const name = document.getElementById('campaignName').value.trim() || 'CRM분석';
    const date = new Date().toISOString().slice(0,10);
    const a = document.createElement('a');
    a.download = `${name}_${date}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
    showToast('이미지 저장 완료');
  } catch(e) { showToast('오류: ' + e.message); }
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}
</script>
</body>
</html>
